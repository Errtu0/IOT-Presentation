name: Deploy Next.js Presentation Site to Pages

on:
  push:
    branches: ["main"]

# CRITICAL SECURITY FIX: Explicitly grants build permissions to the pipeline runner
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup GitHub Pages Operational Environment
        uses: actions/configure-pages@v5
        with:
          static_site_generator: next

      # CHANGED THIS LINE FROM 'npm ci' TO 'npm install' TO BYPASS THE LOCKFILE ERROR
      - name: Install Project Dependencies
        run: npm install

      - name: Compile and Export Static Next.js Distribution
        run: npm run build

      - name: Upload Compiled Distribution Folder
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Push to Live GitHub Pages Server
        id: deployment
        uses: actions/deploy-pages@v4